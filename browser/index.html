<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch Chat Preview</title>
    <style>
        body {
            margin: 0;
            padding: 10px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: white;
            background-color: transparent;
            overflow-y: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            height: 100vh;
            box-sizing: border-box;
        }
        #chat-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .chat-message {
            background-color: rgba(0, 0, 0, 0.5);
            padding: 5px 10px;
            border-radius: 5px;
            margin-bottom: 8px;
            line-height: 1.4;
            word-wrap: break-word;
            font-size: 14px;
        }
        .username {
            font-weight: bold;
            margin-right: 4px;
        }
        .chat-badge {
            width: 18px;
            height: 18px;
            vertical-align: middle;
            margin-right: 4px;
            margin-bottom: 2px;
        }
    </style>
</head>
<body>
    <div id="chat-container"></div>
    <script src="app.js"></script>
</body>
</html>
