name: Release Pipeline

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract Version
        id: get_version
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          if ($tag.StartsWith("v") -or $tag.StartsWith("V")) {
              $tag = $tag.Substring(1)
          }
          if ([string]::IsNullOrWhiteSpace($tag)) {
              $tag = "1.0.0"
          }
          echo "VERSION=$tag" >> $env:GITHUB_ENV

      - name: Publish Project
        run: dotnet publish TwitchChatCore.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true -p:Version=${{ env.VERSION }} -o out

      - name: Create Zip Archive
        run: Compress-Archive -Path out\* -DestinationPath TwiChatFHR.zip

      - name: Upload Release Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name || 'latest' }} TwiChatFHR.zip --clobber
