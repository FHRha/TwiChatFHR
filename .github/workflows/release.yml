name: Release Pipeline

on:
  release:
    types: [published, created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Project
        run: dotnet publish TwitchChatCore.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o out

      - name: Create Zip Archive
        run: Compress-Archive -Path out\* -DestinationPath TwitchChatOverlay.zip

      - name: Upload Release Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name || 'latest' }} TwitchChatOverlay.zip --clobber
